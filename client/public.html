<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Public Ratings • Wine Ratings</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body data-page="public">
<header>
  <div class="nav">
    <div class="brand">🍷 Wine Ratings</div>
    <div class="navlinks">
      <a href="public.html">Public</a>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
    </div>
  </div>
</header>

<main>
  <section class="card">
    <h1 id="title">Public ratings</h1>
    <div class="muted" id="subtitle">Paste a public link like: <code>public.html?u=their-slug</code></div>

    <hr/>

    <label for="slugInput">View a public profile</label>
    <input id="slugInput" placeholder="their-public-slug (example: alex-1a2b3c)">
    <div class="actions">
      <button id="viewBtn">View</button>
      <button class="secondary" id="clearBtn" type="button">Clear</button>
    </div>

    <hr/>

    <div class="list" id="list"></div>
  </section>
</main>

<script>
const API_BASE = "https://wine-ratings-pro.onrender.com/api";

function esc(s){
  return (s ?? "").toString()
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

async function loadBySlug(slug){
  const title = document.getElementById("title");
  const subtitle = document.getElementById("subtitle");
  const list = document.getElementById("list");
  list.innerHTML = "";

  if(!slug){
    title.textContent = "Public ratings";
    subtitle.innerHTML = 'Paste a public link like: <code>public.html?u=their-slug</code>';
    return;
  }

  title.textContent = "Loading…";
  subtitle.textContent = "";

  const res = await fetch(`${API_BASE}/public/${encodeURIComponent(slug)}`);
  const data = await res.json().catch(() => ({}));

  if(!res.ok){
    title.textContent = "Not found";
    subtitle.textContent = data.error || "Could not load public profile.";
    return;
  }

  title.textContent = `${data.user.displayName}’s public ratings`;
  subtitle.innerHTML = `Share link: <code>public.html?u=${esc(data.user.slug)}</code>`;

  const ratings = data.ratings || [];
  if(!ratings.length){
    list.innerHTML = `<div class="muted">No public ratings yet.</div>`;
    return;
  }

  for(const r of ratings){
    const div = document.createElement("div");
    div.className = "item";

    const tags = Array.isArray(r.tags) ? r.tags : [];
    const we = (r.we_score != null && r.we_score !== "") ? ` • WE: ${r.we_score}/100` : "";

    div.innerHTML = `
      <div class="itemhead">
        <div>
          <div style="font-weight:750">${r.favorite ? "⭐ " : ""}${esc(r.wine_name)}</div>
          <div class="muted" style="font-size:12px">${esc(r.style || "—")} • Vintage: ${esc(r.vintage || "—")}</div>
        </div>
        <div class="badge">My: ${Number(r.my_score).toFixed(1)}/10${we}</div>
      </div>

      ${r.price ? `<div class="muted" style="margin-top:6px">Price: $${esc(r.price)}</div>` : ""}
      ${tags.length ? `<div class="muted" style="margin-top:6px">Tags: ${tags.map(esc).join(", ")}</div>` : ""}
      ${r.notes ? `<div style="margin-top:8px">${esc(r.notes)}</div>` : ""}
      ${r.source_url ? `<div style="margin-top:8px"><a href="${r.source_url}" target="_blank" rel="noreferrer">Source link</a></div>` : ""}
    `;

    list.appendChild(div);
  }
}

function init(){
  const params = new URLSearchParams(location.search);
  const u = (params.get("u") || "").trim();
  if(u) document.getElementById("slugInput").value = u;

  loadBySlug(u);

  document.getElementById("viewBtn").addEventListener("click", () => {
    const slug = document.getElementById("slugInput").value.trim();
    if(!slug) return;
    location.href = `public.html?u=${encodeURIComponent(slug)}`;
  });

  document.getElementById("clearBtn").addEventListener("click", () => {
    document.getElementById("slugInput").value = "";
    location.href = "public.html";
  });
}

init();
</script>
</body>
</html>
