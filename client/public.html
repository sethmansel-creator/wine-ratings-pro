<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Public Ratings • Wine Ratings</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<header>
  <div class="nav">
    <div class="brand">🍷 Wine Ratings</div>
    <div class="navlinks">
  <a href="public.html">Public</a>
  <a href="ratings.html">My Ratings</a>
  <a href="add.html">Add</a>
  <a href="select.html">Wine Enthusiast</a>
  <a href="login.html">Login</a>
  <a href="register.html">Register</a>
  <button class="secondary" id="backBtn" style="width:auto;">Back</button>
</div>
  </div>
</header>

<main>
  <section class="card">
    <h1>Public ratings</h1>
    <div class="muted">Showing the latest public ratings from everyone.</div>

    <hr/>

    <div class="actions">
      <button id="refreshBtn">Refresh</button>
      <button class="secondary" id="moreBtn" type="button">Load more</button>
    </div>

    <hr/>

    <div class="list" id="list"></div>
  </section>
</main>

<script>
const API_BASE = "https://wine-ratings-pro.onrender.com/api";
let limit = 100;

function esc(s){
  return (s ?? "").toString()
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

async function load(){
  const list = document.getElementById("list");
  list.innerHTML = `<div class="muted">Loading…</div>`;

  const res = await fetch(`${API_BASE}/public?limit=${limit}`);
  const data = await res.json().catch(() => []);

  if(!res.ok){
    list.innerHTML = `<div class="muted">Could not load public ratings.</div>`;
    return;
  }

  if(!data.length){
    list.innerHTML = `<div class="muted">No public ratings yet.</div>`;
    return;
  }

  list.innerHTML = "";
  for(const r of data){
    const div = document.createElement("div");
    div.className = "item";

    const tags = Array.isArray(r.tags) ? r.tags : [];
    const we = (r.weScore != null && r.weScore !== "") ? ` • WE: ${r.weScore}/100` : "";

    div.innerHTML = `
      <div class="itemhead">
        <div>
          <div style="font-weight:750">${r.favorite ? "⭐ " : ""}${esc(r.wineName)}</div>
          <div class="muted" style="font-size:12px">
            By: ${esc(r.displayName)} • ${esc(r.style || "—")} • Vintage: ${esc(r.vintage || "—")}
          </div>
        </div>
        <div class="badge">My: ${Number(r.myScore).toFixed(1)}/10${we}</div>
      </div>

      ${r.price ? `<div class="muted" style="margin-top:6px">Price: $${esc(r.price)}</div>` : ""}
      ${tags.length ? `<div class="muted" style="margin-top:6px">Tags: ${tags.map(esc).join(", ")}</div>` : ""}
      ${r.notes ? `<div style="margin-top:8px">${esc(r.notes)}</div>` : ""}
      ${r.sourceUrl ? `<div style="margin-top:8px"><a href="${r.sourceUrl}" target="_blank" rel="noreferrer">Source link</a></div>` : ""}
    `;

    list.appendChild(div);
  }
}

document.getElementById("refreshBtn").addEventListener("click", () => load());
document.getElementById("moreBtn").addEventListener("click", () => { limit = Math.min(limit + 100, 500); load(); });

const backBtn = document.getElementById("backBtn");
if(backBtn){
  backBtn.addEventListener("click", () => history.length > 1 ? history.back() : (location.href = "ratings.html"));
}

load();
</script>
</body>
</html>
