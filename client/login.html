<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login • Wine Ratings</title>
  <link rel="stylesheet" href="styles.css"/>

  <style>
    /* ===== ONE-LEVEL-UP PREMIUM LOGIN ===== */

    :root{
      --gold: rgba(214, 174, 92, 0.95);
      --gold2: rgba(214, 174, 92, 0.25);
      --wine: rgba(160, 64, 96, 0.55);
    }

    body.login-elite {
      margin: 0;
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
      background: #0b0b0d;
    }

    /* Background image sits on its own layer so we can animate it smoothly */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url("assets/login-hero.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: scale(1.03);
      animation: slowZoom 18s ease-in-out infinite alternate;
      will-change: transform;
    }

    @keyframes slowZoom{
      0%   { transform: scale(1.03) translateY(0px); }
      100% { transform: scale(1.10) translateY(-10px); }
    }

    /* Premium overlay (wine tint + vignette + soft highlight) */
    .overlay {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(1200px 600px at 15% 10%, rgba(255,255,255,0.10), rgba(255,255,255,0) 55%),
        radial-gradient(1000px 700px at 85% 20%, rgba(160, 64, 96, 0.22), rgba(0,0,0,0) 60%),
        linear-gradient(135deg, rgba(12, 10, 12, 0.70), rgba(8, 8, 10, 0.86)),
        radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 35%, rgba(0,0,0,0.45) 92%);
      backdrop-filter: blur(1px);
    }

    /* Floating light particles (subtle, premium) */
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .particle{
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,0.65), rgba(255,255,255,0));
      opacity: 0.16;
      filter: blur(0.2px);
      animation: floatUp 10s linear infinite;
    }

    /* Each particle gets custom positions + durations via nth-child */
    @keyframes floatUp{
      0%   { transform: translateY(40px); opacity: 0.0; }
      10%  { opacity: 0.16; }
      70%  { opacity: 0.10; }
      100% { transform: translateY(-110vh); opacity: 0.0; }
    }

    .particle:nth-child(1){ left: 10%; top: 85%; animation-duration: 12s; animation-delay: 0s;  transform: translateY(40px) scale(0.9); }
    .particle:nth-child(2){ left: 22%; top: 92%; animation-duration: 14s; animation-delay: 1s;  transform: translateY(40px) scale(1.2); }
    .particle:nth-child(3){ left: 35%; top: 88%; animation-duration: 11s; animation-delay: 2s;  transform: translateY(40px) scale(0.7); }
    .particle:nth-child(4){ left: 48%; top: 95%; animation-duration: 15s; animation-delay: 0.5s;transform: translateY(40px) scale(1.0); }
    .particle:nth-child(5){ left: 62%; top: 90%; animation-duration: 13s; animation-delay: 2.5s;transform: translateY(40px) scale(1.3); }
    .particle:nth-child(6){ left: 74%; top: 93%; animation-duration: 16s; animation-delay: 1.5s;transform: translateY(40px) scale(0.8); }
    .particle:nth-child(7){ left: 86%; top: 87%; animation-duration: 12.5s;animation-delay: 3s;  transform: translateY(40px) scale(1.1); }
    .particle:nth-child(8){ left: 92%; top: 94%; animation-duration: 14.5s;animation-delay: 2s;  transform: translateY(40px) scale(0.9); }

    /* Top bar */
    .topbar{
      position: sticky;
      top: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 28px;
    }

    .brand{
      display: flex;
      align-items: baseline;
      gap: 10px;
      font-weight: 900;
      letter-spacing: 0.6px;
      user-select: none;
    }

    .brand .logo{
      font-size: 20px;
      filter: drop-shadow(0 12px 18px rgba(0,0,0,0.45));
    }

    .brand .name{
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 1.7px;
      opacity: 0.96;
    }

    .navlinks a{
      color: rgba(255,255,255,0.90);
      text-decoration: none;
      margin-left: 16px;
      font-weight: 650;
      font-size: 14px;
      letter-spacing: 0.35px;
    }
    .navlinks a:hover{ text-decoration: underline; }

    /* Center layout */
    .wrap{
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 2;
    }

    /* Card */
    .card-elite{
      width: 100%;
      max-width: 520px;
      border-radius: 22px;
      padding: 34px 30px 28px;
      background: rgba(12, 12, 14, 0.62);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow:
        0 34px 90px rgba(0,0,0,0.70),
        inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);

      opacity: 0;
      transform: translateY(20px) scale(0.98);
      animation: cardIn 0.85s ease-out forwards;
    }

    @keyframes cardIn{
      0%   { opacity: 0; transform: translateY(20px) scale(0.98); }
      60%  { opacity: 1; transform: translateY(-4px) scale(1.01); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .kicker{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
      margin-bottom: 10px;
    }

    .kicker .dot{
      width: 7px; height: 7px; border-radius: 999px;
      background: var(--gold);
      box-shadow: 0 0 0 6px var(--gold2);
    }

    .card-elite h1{
      margin: 0 0 10px;
      font-size: 30px;
      letter-spacing: 0.6px;
    }

    .tagline{
      margin: 0 0 20px;
      color: rgba(255,255,255,0.76);
      font-size: 14px;
      line-height: 1.45;
    }

    .divider{
      height: 1px;
      background: rgba(255,255,255,0.10);
      margin: 18px 0;
    }

    /* Inputs */
    .card-elite label{
      color: rgba(255,255,255,0.86);
    }

    .card-elite input{
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.95);
    }

    .card-elite input:focus{
      outline: none;
      border-color: var(--wine);
      box-shadow: 0 0 0 3px rgba(160, 64, 96, 0.22);
    }

    /* Gold primary button without touching global CSS */
    .card-elite .actions button[type="submit"]{
      background: linear-gradient(135deg, rgba(214,174,92,0.98), rgba(186,132,58,0.98));
      border: 1px solid rgba(255,255,255,0.20);
      color: rgba(15, 12, 10, 0.95);
      font-weight: 800;
      letter-spacing: 0.3px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.35);
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    .card-elite .actions button[type="submit"]:hover{
      filter: brightness(1.03);
      transform: translateY(-1px);
    }

    .card-elite .actions button[type="submit"]:active{
      transform: translateY(0px);
    }

    /* Footer */
    .footer{
      padding: 0 28px 22px;
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      text-align: center;
      z-index: 2;
    }

    @media (max-width: 520px){
      .card-elite{ padding: 26px 18px 20px; border-radius: 18px; }
      .card-elite h1{ font-size: 26px; }
      .navlinks a{ margin-left: 12px; }
    }

    /* Respect reduced motion */
    @media (prefers-reduced-motion: reduce){
      .bg, .particle, .card-elite { animation: none !important; }
      .card-elite { opacity: 1; transform: none; }
    }
  </style>
</head>

<body data-page="login" class="login-elite">
  <!-- Background layer -->
  <div class="bg" aria-hidden="true"></div>

  <div class="overlay">
    <!-- Particles layer -->
    <div class="particles" aria-hidden="true">
      <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
    </div>

    <header class="topbar">
      <div class="brand">
        <div class="logo">🍷</div>
        <div class="name">Wine Ratings</div>
      </div>
      <div class="navlinks">
        <a href="public.html">Public</a>
        <a href="register.html">Register</a>
      </div>
    </header>

    <div class="wrap">
      <section class="card-elite">
        <div class="kicker"><span class="dot"></span> Reserve Collection</div>
        <h1>Welcome back</h1>
        <p class="tagline">
          Curate your pours with taste — rate bottles, remember favorites, and share what deserves a second glass.
        </p>

        <div class="divider"></div>

        <form id="loginForm">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="email" required>

          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" minlength="8" required>

          <div class="actions" style="margin-top:15px">
            <button type="submit">Login</button>
            <a class="secondary"
               style="text-align:center; padding:10px; border-radius:10px;"
               href="register.html">
              Create account
            </a>
          </div>
        </form>
      </section>
    </div>

    <div class="footer">
      Tip: Mark a rating “Public” to appear in the global feed.
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
